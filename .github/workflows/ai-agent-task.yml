name: AI Coding Agent - Issue Handler

# Automatically submits issues labeled 'ai-agent' to the AI Coding Agent platform.
#
# Required setup:
# 1. Repository Variable: AI_AGENT_URL (e.g., https://coding-agent.smartbyte.pl)
# 2. Repository Secret: AI_AGENT_API_KEY (create via dashboard after OAuth login)
#
# Optional labels:
# - branch:branch-name - Set the base branch (default: test)

on:
  issues:
    types: [opened, labeled]

# Required permissions for commenting on issues
permissions:
  issues: write
  contents: read

jobs:
  submit-task:
    # Only run if issue has 'ai-agent' label
    if: contains(github.event.issue.labels.*.name, 'ai-agent')
    runs-on: ubuntu-latest

    steps:
      - name: Extract Branch from Labels
        id: branch
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.issue.labels || [];
            let baseBranch = 'test';

            for (const label of labels) {
              if (label.name.startsWith('branch:')) {
                baseBranch = label.name.substring(7); // Remove 'branch:' prefix
                break;
              }
            }

            console.log(`Base branch: ${baseBranch}`);
            core.setOutput('base_branch', baseBranch);

      - name: Submit Task to AI Agent
        id: submit
        env:
          AI_AGENT_URL: ${{ vars.AI_AGENT_URL }}
          AI_AGENT_API_KEY: ${{ secrets.AI_AGENT_API_KEY }}
          BASE_BRANCH: ${{ steps.branch.outputs.base_branch }}
        run: |
          # Default URL if not set
          API_URL="${AI_AGENT_URL:-https://coding-agent.smartbyte.pl}"

          echo "Using base branch: $BASE_BRANCH"

          # Build request payload
          PAYLOAD=$(jq -n \
            --arg repo "https://github.com/${{ github.repository }}" \
            --arg prompt "$(cat << 'EOF'
          Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

          ${{ github.event.issue.body }}

          Please fix this issue and ensure all tests pass.
          EOF
          )" \
            --arg base_branch "$BASE_BRANCH" \
            --argjson max_iterations 5 \
            '{repo: $repo, prompt: $prompt, base_branch: $base_branch, max_iterations: $max_iterations}')

          echo "Submitting task to $API_URL/api/solve"
          echo "Payload: $PAYLOAD"

          # Submit task using API key (created via dashboard)
          RESPONSE=$(curl -s -X POST "$API_URL/api/solve" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $AI_AGENT_API_KEY" \
            -d "$PAYLOAD")

          echo "Response: $RESPONSE"

          # Extract task ID
          TASK_ID=$(echo "$RESPONSE" | jq -r '.id // empty')

          if [ -z "$TASK_ID" ]; then
            echo "Failed to create task"
            echo "error=$(echo "$RESPONSE" | jq -r '.detail // .message // "Unknown error"')" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "task_id=$TASK_ID" >> $GITHUB_OUTPUT
          echo "Task created: $TASK_ID"

      - name: Comment on Issue - Task Started
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const taskId = '${{ steps.submit.outputs.task_id }}';
            const baseBranch = '${{ steps.branch.outputs.base_branch }}';
            const agentUrl = '${{ vars.AI_AGENT_URL }}' || 'https://coding-agent.smartbyte.pl';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🤖 **AI Coding Agent Task Started**

              Task ID: \`${taskId}\`
              Base Branch: \`${baseBranch}\`

              The AI agent is now working on this issue. It will:
              1. Analyze the codebase
              2. Make necessary changes
              3. Run tests to verify the fix
              4. Create a Pull Request when complete

              You can track progress at: ${agentUrl}

              ---
              *This comment was automatically generated by the AI Coding Agent.*`
            });

      - name: Comment on Issue - Task Failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const error = '${{ steps.submit.outputs.error }}' || 'Unknown error';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ **AI Coding Agent - Failed to Start**

              Error: ${error}

              Please check that:
              - The AI Agent service is running
              - The \`AI_AGENT_URL\` variable is configured
              - The \`AI_AGENT_API_KEY\` secret contains a valid API key (create one via the dashboard)

              ---
              *This comment was automatically generated by the AI Coding Agent.*`
            });
