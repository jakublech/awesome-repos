name: AI Coding Agent - Status Checker

# Checks task status and updates the associated GitHub issue.
#
# Required setup:
# 1. Repository Variable: AI_AGENT_URL (e.g., https://coding-agent.smartbyte.pl)
# 2. Repository Secret: AI_AGENT_API_KEY (create via dashboard after OAuth login)

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: 'Task ID to check'
        required: true
      issue_number:
        description: 'Issue number to update'
        required: true

  # Can also be triggered by repository dispatch from webhook
  repository_dispatch:
    types: [ai-agent-completed]

# Required permissions for commenting on issues and adding labels
permissions:
  issues: write
  contents: read

jobs:
  check-status:
    runs-on: ubuntu-latest

    steps:
      - name: Get Task Status
        id: status
        env:
          AI_AGENT_URL: ${{ vars.AI_AGENT_URL }}
          AI_AGENT_API_KEY: ${{ secrets.AI_AGENT_API_KEY }}
          TASK_ID: ${{ github.event.inputs.task_id || github.event.client_payload.task_id }}
        run: |
          API_URL="${AI_AGENT_URL:-https://coding-agent.smartbyte.pl}"

          RESPONSE=$(curl -s "$API_URL/api/tasks/$TASK_ID" \
            -H "Authorization: Bearer $AI_AGENT_API_KEY")

          echo "Response: $RESPONSE"

          STATUS=$(echo "$RESPONSE" | jq -r '.status')
          echo "status=$STATUS" >> $GITHUB_OUTPUT

          if [ "$STATUS" = "success" ]; then
            PR_URL=$(echo "$RESPONSE" | jq -r '.result.pr_url // empty')
            SUMMARY=$(echo "$RESPONSE" | jq -r '.result.summary // "Task completed successfully"')
            ITERATIONS=$(echo "$RESPONSE" | jq -r '.result.iterations // 0')
            FILES=$(echo "$RESPONSE" | jq -r '.result.files_modified // [] | join(", ")')

            echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
            echo "summary=$SUMMARY" >> $GITHUB_OUTPUT
            echo "iterations=$ITERATIONS" >> $GITHUB_OUTPUT
            echo "files=$FILES" >> $GITHUB_OUTPUT

          elif [ "$STATUS" = "failed" ]; then
            ERROR=$(echo "$RESPONSE" | jq -r '.error_message // "Unknown error"')
            echo "error=$ERROR" >> $GITHUB_OUTPUT
          fi

      - name: Update Issue - Success
        if: steps.status.outputs.status == 'success'
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number || github.event.client_payload.issue_number }}
        with:
          script: |
            const prUrl = '${{ steps.status.outputs.pr_url }}';
            const summary = '${{ steps.status.outputs.summary }}';
            const iterations = '${{ steps.status.outputs.iterations }}';
            const files = '${{ steps.status.outputs.files }}';
            const issueNumber = parseInt(process.env.ISSUE_NUMBER);

            let body = `✅ **AI Coding Agent - Task Completed**

            ${summary}

            **Details:**
            - Iterations used: ${iterations}
            - Files modified: ${files || 'None'}
            `;

            if (prUrl) {
              body += `\n**Pull Request:** ${prUrl}`;
            }

            body += `\n\n---\n*This comment was automatically generated by the AI Coding Agent.*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: body
            });

            // Add 'ai-completed' label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['ai-completed']
            });

      - name: Update Issue - Failed
        if: steps.status.outputs.status == 'failed'
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number || github.event.client_payload.issue_number }}
        with:
          script: |
            const error = '${{ steps.status.outputs.error }}';
            const issueNumber = parseInt(process.env.ISSUE_NUMBER);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `❌ **AI Coding Agent - Task Failed**

              The AI agent was unable to complete this task.

              **Error:** ${error}

              Please review the issue description and try again, or handle this manually.

              ---
              *This comment was automatically generated by the AI Coding Agent.*`
            });

            // Add 'ai-failed' label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['ai-failed']
            });
